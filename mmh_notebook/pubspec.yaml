name: mmh_notebook
description: "MMH Notebook - Professional Notes Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0
  
  # Encryption
  encrypt: ^5.0.3
  
  # File handling
  file_picker: ^6.1.0
  image_picker: ^1.0.0
  
  # Audio recording
  record: ^6.0.0
  audioplayers: ^5.2.0
  
  # Export/Import
  pdf: ^3.10.0
  html: ^0.15.4
  
  # State management
  provider: ^6.1.0
  
  # Localization
  intl: ^0.20.2
  
  # UI/UX
  share_plus: ^7.2.0
  
  # Local storage
  shared_preferences: ^2.2.3
  
  # Utils
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
