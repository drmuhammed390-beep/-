name: Build APK and EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: mmh_notebook
        run: flutter pub get

      - name: Build APK
        working-directory: mmh_notebook
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: mmh_notebook/build/app/outputs/flutter-apk/app-release.apk

  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Dependencies
        working-directory: mmh_notebook
        run: flutter pub get

      - name: Build Windows Executable
        working-directory: mmh_notebook
        run: flutter build windows --release

      - name: Upload Windows Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE-App
          path: mmh_notebook/build/windows/runner/Release/
